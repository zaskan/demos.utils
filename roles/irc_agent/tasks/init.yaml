# Optional: IRC_AGENT_* in the environment override defaults (test / CI / shell).
---
- name: Set irc_agent options from environment when set
  ansible.builtin.set_fact:
    irc_agent_namespace: "{{ (lookup('env', 'IRC_AGENT_NAMESPACE', default=irc_agent_namespace) | string) | trim or irc_agent_namespace }}"
    irc_agent_image: "{{ (lookup('env', 'IRC_AGENT_IMAGE', default=irc_agent_image) | string) | trim or irc_agent_image }}"
    irc_agent_create_project: "{{ (lookup('env', 'IRC_AGENT_CREATE_PROJECT', default=irc_agent_create_project | bool | ternary('1', '0')) | string | lower) not in ['0', 'false', 'no', 'n'] }}"
    irc_agent_irc_host: "{{ (lookup('env', 'IRC_AGENT_IRC_HOST', default=irc_agent_irc_host) | string) | trim }}"
    irc_agent_irc_port: "{{ (lookup('env', 'IRC_AGENT_IRC_PORT', default=irc_agent_irc_port) | string) | trim or irc_agent_irc_port }}"
    irc_agent_irc_tls: "{{ (lookup('env', 'IRC_AGENT_IRC_TLS', default=irc_agent_irc_tls) | string) | trim or irc_agent_irc_tls }}"
    irc_agent_irc_channel: "{{ (lookup('env', 'IRC_AGENT_IRC_CHANNEL', default=irc_agent_irc_channel) | string) | trim }}"
    irc_agent_irc_nick: "{{ (lookup('env', 'IRC_AGENT_IRC_NICK', default=irc_agent_irc_nick) | string) | trim or irc_agent_irc_nick }}"
    irc_agent_irc_password: "{{ (lookup('env', 'IRC_AGENT_IRC_PASSWORD', default=irc_agent_irc_password) | string) | trim }}"
    irc_agent_auto_provision_ergo_account: "{{ (lookup('env', 'IRC_AGENT_AUTO_PROVISION', default=irc_agent_auto_provision_ergo_account | bool | ternary('1', '0')) | string | lower) not in ['0', 'false', 'no', 'n'] }}"
    irc_agent_ergo_pass_account_style: "{{ (lookup('env', 'IRC_AGENT_ERGO_PASS_ACCOUNT_STYLE', default=irc_agent_ergo_pass_account_style | bool | ternary('1', '0')) | string | lower) not in ['0', 'false', 'no', 'n'] }}"
    irc_agent_ergo_ircd_namespace: "{{ (lookup('env', 'IRC_AGENT_ERGO_IRCD_NAMESPACE', default=irc_agent_ergo_ircd_namespace) | string) | trim }}"
    irc_agent_ergo_ircd_configmap: "{{ (lookup('env', 'IRC_AGENT_ERGO_IRCD_CONFIGMAP', default=irc_agent_ergo_ircd_configmap) | string) | trim or irc_agent_ergo_ircd_configmap }}"
    irc_agent_ergo_ircd_config_key: "{{ (lookup('env', 'IRC_AGENT_ERGO_IRCD_CONFIG_KEY', default=irc_agent_ergo_ircd_config_key) | string) | trim or irc_agent_ergo_ircd_config_key }}"
    irc_agent_ergo_inspect_ircd: "{{ (lookup('env', 'IRC_AGENT_ERGO_INSPECT_IRCD', default=irc_agent_ergo_inspect_ircd | bool | ternary('1', '0')) | string | lower) not in ['0', 'false', 'no', 'n'] }}"
    irc_agent_ergo_seed_image: "{{ (lookup('env', 'IRC_AGENT_ERGO_SEED_IMAGE', default=irc_agent_ergo_seed_image) | string) | trim or irc_agent_ergo_seed_image }}"
    irc_agent_fail_on_ergo_seed: "{{ (lookup('env', 'IRC_AGENT_FAIL_ON_ERGO_SEED', default=irc_agent_fail_on_ergo_seed | bool | ternary('1', '0')) | string | lower) not in ['0', 'false', 'no', 'n', ''] }}"
    irc_agent_llm_base_url: "{{ (lookup('env', 'IRC_AGENT_LLM_BASE_URL', default=irc_agent_llm_base_url) | string) | trim }}"
    irc_agent_llm_model: "{{ (lookup('env', 'IRC_AGENT_LLM_MODEL', default=irc_agent_llm_model) | string) | trim or irc_agent_llm_model }}"
    irc_agent_llm_timeout: "{{ (lookup('env', 'IRC_AGENT_LLM_TIMEOUT', default=irc_agent_llm_timeout) | string) | trim or irc_agent_llm_timeout }}"
    irc_agent_llm_max_input_tokens: "{{ lookup('env', 'IRC_AGENT_LLM_MAX_INPUT_TOKENS', default=irc_agent_llm_max_input_tokens | string) | int }}"
    irc_agent_llm_api_key: "{{ (lookup('env', 'IRC_AGENT_LLM_API_KEY', default=irc_agent_llm_api_key) | string) | trim }}"
    irc_agent_mcp_enabled: "{{ (lookup('env', 'IRC_AGENT_MCP_ENABLED', default=irc_agent_mcp_enabled | bool | ternary('1', '0')) | string | lower) not in ['0', 'false', 'no', 'n', ''] }}"
    irc_agent_aap_mcp_server_url: "{{ ((lookup('env', 'IRC_AGENT_AAP_MCP_SERVER_URL', default='') | string | trim) or (lookup('env', 'AAP_MCP_SERVER_URL', default='') | string | trim) or (irc_agent_aap_mcp_server_url | default('') | string)) | trim }}"
    irc_agent_aap_mcp_server_token: "{{ ((lookup('env', 'IRC_AGENT_AAP_MCP_SERVER_TOKEN', default='') | string | trim) or (lookup('env', 'AAP_MCP_SERVER_TOKEN', default='') | string | trim) or (irc_agent_aap_mcp_server_token | default('') | string)) | trim }}"
    irc_agent_mcp_first_tool_choice: "{{ ((lookup('env', 'IRC_AGENT_MCP_FIRST_TOOL_CHOICE', default='')) | string | trim) or (irc_agent_mcp_first_tool_choice | default('auto') | string) }}"
    irc_agent_mcp_http_transport: "{{ ((lookup('env', 'IRC_AGENT_MCP_HTTP_TRANSPORT', default='')) | string | trim) or (irc_agent_mcp_http_transport | default('streamable') | string) }}"
    irc_agent_irc_context_max_messages: "{{ lookup('env', 'IRC_AGENT_IRC_CONTEXT_MAX_MESSAGES', default=irc_agent_irc_context_max_messages | string) | int }}"
    irc_agent_irc_context_max_chars: "{{ lookup('env', 'IRC_AGENT_IRC_CONTEXT_MAX_CHARS', default=irc_agent_irc_context_max_chars | string) | int }}"
    irc_agent_irc_context_disabled: "{{ (lookup('env', 'IRC_AGENT_IRC_CONTEXT_DISABLED', default=irc_agent_irc_context_disabled | bool | ternary('1', '0')) | string | lower) not in ['0', 'false', 'no', 'n', ''] }}"

- name: Assert required irc_agent configuration
  ansible.builtin.assert:
    that:
      - irc_agent_irc_host | default('') | string | length > 0
      - irc_agent_irc_channel | default('') | string | length > 0
      - irc_agent_llm_base_url | default('') | string | length > 0
      - irc_agent_llm_api_key | default('') | string | length > 0
    fail_msg: >-
      Set irc agent vars or export IRC_AGENT_IRC_HOST, IRC_AGENT_IRC_CHANNEL,
      IRC_AGENT_LLM_BASE_URL, IRC_AGENT_LLM_API_KEY (and optional rest). See
      roles/irc_agent/defaults/main.yml

- name: Assert NickServ / IRC account password when not using auto-provision
  when: not irc_agent_auto_provision_ergo_account | default(true) | bool
  ansible.builtin.assert:
    that:
      - irc_agent_irc_password | default('') | string | length > 0
    fail_msg: >-
      Set irc_agent_irc_password (or IRC_AGENT_IRC_PASSWORD), or enable
      irc_agent_auto_provision_ergo_account (default true) to register via NickServ.

- name: Assert AAP MCP bearer token when AAP MCP URL is set and MCP is enabled
  when:
    - irc_agent_mcp_enabled | default(true) | bool
    - irc_agent_aap_mcp_server_url | default('') | string | trim | length > 0
  ansible.builtin.assert:
    that:
      - irc_agent_aap_mcp_server_token | default('') | string | trim | length > 0
    fail_msg: >-
      Set irc_agent_aap_mcp_server_token (or export AAP_MCP_SERVER_TOKEN /
      IRC_AGENT_AAP_MCP_SERVER_TOKEN) when irc_agent_aap_mcp_server_url is set, or clear the URL
      to deploy without AAP MCP HTTP servers.
