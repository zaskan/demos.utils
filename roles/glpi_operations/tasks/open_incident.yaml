---
- name: Initialize GLPI API session (write)
  ansible.builtin.uri:
    url: "{{ glpi_api_url }}/initSession?session_write=true"
    method: GET
    headers:
      Content-Type: application/json
      App-Token: "{{ glpi_app_token if (glpi_app_token is defined and glpi_app_token | length > 0) else omit }}"
      Authorization: "{{ ('user_token ' ~ glpi_user_token) if (glpi_user_token is defined and glpi_user_token | length > 0) else omit }}"
    url_username: "{{ glpi_username if glpi_use_basic_auth else omit }}"
    url_password: "{{ glpi_password if glpi_use_basic_auth else omit }}"
    force_basic_auth: "{{ glpi_use_basic_auth | bool }}"
    validate_certs: "{{ glpi_validate_certs | default(true) }}"
    return_content: true
    status_code: [200]
  register: glpi_init
  vars:
    glpi_use_basic_auth: >-
      {{ (glpi_user_token is not defined or glpi_user_token | length == 0)
      and (glpi_username is defined and glpi_username | length > 0)
      and (glpi_password is defined and glpi_password | length > 0) }}
  no_log: true

- name: Set GLPI session token fact
  ansible.builtin.set_fact:
    glpi_session_token: "{{ glpi_init.json.session_token }}"

- name: Build Ticket create payload
  ansible.builtin.set_fact:
    glpi_ticket_input: "{{ glpi_ticket_base | combine(glpi_ticket_requester) }}"
  vars:
    glpi_ticket_base:
      name: "{{ glpi_incident_title }}"
      content: "{{ glpi_incident_description }}"
      type: 1
      impact: "{{ glpi_incident_impact | default(3) | int }}"
      urgency: "{{ glpi_incident_urgency | default(3) | int }}"
    glpi_ticket_requester: "{{ {'_users_id_requester': [glpi_incident_requester_id | int]} if (glpi_incident_requester_id is defined and glpi_incident_requester_id | int != 0) else {} }}"

- name: Create GLPI Ticket (incident)
  ansible.builtin.uri:
    url: "{{ glpi_api_url }}/Ticket/"
    method: POST
    headers:
      Content-Type: application/json
      App-Token: "{{ glpi_app_token if (glpi_app_token is defined and glpi_app_token | length > 0) else omit }}"
      Session-Token: "{{ glpi_session_token }}"
    body_format: json
    body:
      input: "{{ glpi_ticket_input }}"
    validate_certs: "{{ glpi_validate_certs | default(true) }}"
    return_content: true
    status_code: [200, 201]
  register: glpi_new_ticket

- name: Set GLPI ticket to processing (in progress)
  ansible.builtin.uri:
    url: "{{ glpi_api_url }}/Ticket/{{ glpi_new_ticket.json.id }}"
    method: PATCH
    headers:
      Content-Type: application/json
      App-Token: "{{ glpi_app_token if (glpi_app_token is defined and glpi_app_token | length > 0) else omit }}"
      Session-Token: "{{ glpi_session_token }}"
    body_format: json
    body:
      input:
        status: 2
    validate_certs: "{{ glpi_validate_certs | default(true) }}"
    return_content: true
    status_code: [200, 206]
  when: glpi_new_ticket.json.id is defined

- name: Set GLPI incident id for downstream jobs
  ansible.builtin.set_stats:
    data:
      incident: "{{ glpi_new_ticket.json.id | string }}"

- name: Remember GLPI ticket id for later tasks in the same play
  ansible.builtin.set_fact:
    glpi_last_ticket_id: "{{ glpi_new_ticket.json.id }}"
  when: glpi_new_ticket.json.id is defined

- name: End GLPI API session
  ansible.builtin.uri:
    url: "{{ glpi_api_url }}/killSession"
    method: GET
    headers:
      Content-Type: application/json
      App-Token: "{{ glpi_app_token if (glpi_app_token is defined and glpi_app_token | length > 0) else omit }}"
      Session-Token: "{{ glpi_session_token }}"
    validate_certs: "{{ glpi_validate_certs | default(true) }}"
    status_code: [200, 400]
  failed_when: false
